services:
  vault:
    image: hashicorp/vault:1.15
    container_name: vaultui-dev
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_LOG_LEVEL: info
    cap_add:
      - IPC_LOCK
    tmpfs:
      - /vault/data
    volumes:
      - ./tmp/audit:/vault/audit

  seed:
    image: hashicorp/vault:1.15
    depends_on:
      - vault
    restart: "no"
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    volumes:
      - ./scripts/seed.sh:/seed.sh:ro
    entrypoint: /bin/sh
    command: ["/seed.sh"]

  vaultui:
    build: .
    depends_on:
      - seed
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      TERM: xterm-256color
    stdin_open: true
    tty: true
    profiles:
      - ui

