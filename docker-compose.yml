services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql/data

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: iam,sts
      EAGER_SERVICE_LOADING: 1
    ports:
      - "4566:4566"

  vault:
    image: hashicorp/vault:1.15
    container_name: vaultui-dev
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_LOG_LEVEL: info
    cap_add:
      - IPC_LOCK
    tmpfs:
      - /vault/data

  seed:
    image: hashicorp/vault:1.15
    depends_on:
      - vault
      - postgres
      - localstack
    restart: "no"
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    volumes:
      - ./scripts/seed.sh:/seed.sh:ro
    entrypoint: /bin/sh
    command: ["/seed.sh"]

  vaultui:
    build: .
    depends_on:
      - seed
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      TERM: xterm-256color
    stdin_open: true
    tty: true
    profiles:
      - ui

