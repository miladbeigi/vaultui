services:
  vault:
    image: hashicorp/vault:1.15
    container_name: vaultui-dev
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_LOG_LEVEL: info
    cap_add:
      - IPC_LOCK
    tmpfs:
      - /vault/data

  seed:
    image: hashicorp/vault:1.15
    depends_on:
      - vault
    restart: "no"
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sleep 2

        vault audit enable file file_path=stdout

        vault kv put secret/apps/myapp/config \
          db_host=db.internal.example.com \
          db_port=5432 \
          db_name=myapp_production \
          db_user=myapp_svc \
          db_password=s3cret!

        vault kv put secret/apps/myapp/database \
          connection_url="postgresql://db.internal:5432/myapp" \
          username=admin \
          password=hunter2

        vault kv put secret/apps/myapp/api-keys \
          stripe_key=sk_live_abc123 \
          sendgrid_key=SG.xyz789

        vault kv put secret/apps/billing/config \
          api_url=https://billing.example.com \
          timeout=30s

        CERT=$$(printf '-----BEGIN CERTIFICATE-----\nMIIFazCCA1OgAwIBAgIUEJzGFMHhKLkjSbGBbCOIZmQDM3owDQYJKoZIhvcNAQEL\nBQAwRTELMAkGA1UEBhMCVVMxEzARBgNVBAgMClNvbWUtU3RhdGUxITAfBgNVBAoM\nGEludGVybmV0IFdpZGdpdHMgUHR5IEx0ZDAeFw0yNTAxMDEwMDAwMDBaFw0yNjAx\nMDEwMDAwMDBaMEUxCzAJBgNVBAYTAlVTMRMwEQYDVQQIDApTb21lLVN0YXRlMSEw\n-----END CERTIFICATE-----')
        PKEY=$$(printf '-----BEGIN RSA PRIVATE KEY-----\nMIIEowIBAAKCAQEA2a2rwplBQLfBCW1OZMM1RqRFHGFLMND/TjKDMp1NFQT9XGBx\nXm/K3FYPbLdGKyNBCMzjQbNOIwJce2fCMNHVMk+YHaGFMI3bMGdWPGT5MBM0XzW\nwJ4c1M5y3H8E7LqB4AkFPQa3igNprWHDflAeB3Y2PWMZR8rOaYEMQm1zKHPXLF0\nhs0tXmAjr6YMPBbtGEQaFyTVppFNahJBNMKBOCfS6IYGwqfGVR7bBjLNOlF0jVaM\n-----END RSA PRIVATE KEY-----')
        vault kv put secret/infra/tls/wildcard cert="$$CERT" key="$$PKEY"

        vault kv put secret/infra/aws \
          access_key=AKIAIOSFODNN7EXAMPLE \
          secret_key=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY

        SSH_PRIV=$$(printf '-----BEGIN OPENSSH PRIVATE KEY-----\nb3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW\nQyNTUxOQAAACBHKJHasdkjhASDKJHASKDJHASKDJHASDKJHASDKJHASD==AAAAFQAAAA\nRkVwbG95QHByb2QBAgMEBQ==\n-----END OPENSSH PRIVATE KEY-----')
        vault kv put secret/infra/ssh/deploy-key \
          public_key="ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABgQC7vbqajC8QfEn7KUZMHBKJHKJHASK deploy@prod" \
          private_key="$$SSH_PRIV"

        echo "Seed data loaded."
